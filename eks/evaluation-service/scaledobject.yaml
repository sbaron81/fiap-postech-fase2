# Requer o KEDA instalado no cluster:
#   helm repo add kedacore https://kedacore.github.io/charts
#   helm repo update
#   helm install keda kedacore/keda --namespace keda --create-namespace
#
# identityOwner: operator faz o scaler usar as credenciais AWS do próprio
# pod do keda-operator. Como esse pod roda nos mesmos nodes do EKS e a
# NodeInstanceRole já tem AmazonSQSFullAccess, nenhuma TriggerAuthentication
# é necessária. Se a permissão de SQS sair da NodeInstanceRole no futuro,
# criar uma TriggerAuthentication (IRSA ou access keys) e referenciá-la em
# spec.triggers[].authenticationRef.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: evaluation-service-scaledobject
  namespace: evaluation-service
spec:
  scaleTargetRef:
    name: evaluation-service
  minReplicaCount: 2
  maxReplicaCount: 10
  pollingInterval: 15   # segundos entre cada checagem da fila
  cooldownPeriod: 60    # segundos sem trabalho antes de voltar ao mínimo de réplicas
  triggers:
    - type: aws-sqs-queue
      metadata:
        queueURL: https://sqs.us-east-1.amazonaws.com/343770067934/fiap-fase2
        queueLength: "1"     # 1 mensagem na fila por réplica
        awsRegion: us-east-1
        identityOwner: operator
