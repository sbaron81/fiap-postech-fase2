# Um Ingress por namespace (o backend de um Ingress precisa estar no mesmo
# namespace do recurso). Todos usam ingressClassName: nginx, então o
# ingress-nginx-controller (instalado via Helm, ver ingress-nginx/values.yaml)
# agrega as regras de todos eles sob o mesmo Load Balancer.
#
# O annotation rewrite-target remove o prefixo (/auth, /flags, ...) antes de
# encaminhar para o serviço, já que as aplicações expõem suas rotas na raiz
# (ex: /health, /validate), não em /auth/health.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-service-ingress
  namespace: auth-service
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 8001
